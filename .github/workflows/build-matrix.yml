name: Better Lore build matrix

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        minecraft: [26.2, 26.1.2, 26.1.1, 26.1, 1.21.11, 1.21.10, 1.21.9, 1.21.8, 1.21.7, 1.21.6, 1.21.5, 1.21.4, 1.21.3, 1.21.2, 1.21.1, 1.21, 1.20.6, 1.20.5]
        loader: [fabric, neoforge, forge]
        exclude:
          - minecraft: 1.20.5
            loader: forge
          - minecraft: 1.21.2
            loader: forge
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ startsWith(matrix.minecraft, '26.') && '25' || '21' }}
      - uses: gradle/actions/setup-gradle@v4
      - name: Validate matrix
        run: python3 scripts/verify_matrix.py
      - name: Build target
        shell: bash
        run: |
          target='${{ matrix.minecraft }}'
          base='26.1.2'
          common="$base"
          if [ "$target" != "$base" ]; then common="$base,$target"; fi
          fabric="$base"
          neoforge="$base"
          forge="$base"
          case '${{ matrix.loader }}' in
            fabric) fabric="$common" ;;
            neoforge) neoforge="$common" ;;
            forge) forge="$common" ;;
          esac
          ./gradlew \
            "-Pstonecutter_enabled_common_versions=$common" \
            "-Pstonecutter_enabled_fabric_versions=$fabric" \
            "-Pstonecutter_enabled_neoforge_versions=$neoforge" \
            "-Pstonecutter_enabled_forge_versions=$forge" \
            ':${{ matrix.loader }}:${{ matrix.minecraft }}:build'
