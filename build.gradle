plugins {
	id 'net.fabricmc.fabric-loom' version "${loom_version}"
	id 'maven-publish'
}

version = project.mod_version + '+mc' + project.target_version
group = project.maven_group

base {
	archivesName = project.archives_base_name
}

repositories {
	mavenCentral()
	maven {
		name = "Jared"
		url = "https://maven.blamejared.com/"
	}
	maven {
		name = "Shedaniel"
		url = "https://maven.shedaniel.me/"
	}
	maven {
		name = "Modrinth"
		url = "https://api.modrinth.com/maven"
	}
}

dependencies {
	minecraft "com.mojang:minecraft:${project.minecraft_version}"
	implementation "net.fabricmc:fabric-loader:${project.loader_version}"
	implementation "net.fabricmc.fabric-api:fabric-api:${project.fabric_api_version}"
	implementation include("maven.modrinth:placeholder-api:${project.placeholder_api_version}")

	compileOnly "mezz.jei:jei-${project.minecraft_version}-fabric-api:${project.jei_version}"
	compileOnly "me.shedaniel:RoughlyEnoughItems-api-fabric:${project.rei_version}"
	compileOnly "me.shedaniel.cloth:basic-math:0.6.1"

	testImplementation "org.junit.jupiter:junit-jupiter:6.0.1"
	testRuntimeOnly "org.junit.platform:junit-platform-launcher:6.0.1"
}

processResources {
	inputs.property "version", project.version

	filesMatching("fabric.mod.json") {
		expand "version": inputs.properties.version
	}
}

def java25Launcher = javaToolchains.launcherFor {
	languageVersion = JavaLanguageVersion.of(25)
}

tasks.withType(JavaCompile).configureEach {
	options.release = 25
}

tasks.withType(Test).configureEach {
	useJUnitPlatform()
	javaLauncher = java25Launcher
}

java {
	toolchain {
		languageVersion = JavaLanguageVersion.of(25)
	}

	withSourcesJar()

	sourceCompatibility = JavaVersion.VERSION_25
	targetCompatibility = JavaVersion.VERSION_25
}

jar {
	inputs.property "archivesName", project.base.archivesName

	from("LICENSE") {
		rename { "${it}_${inputs.properties.archivesName}" }
	}
}

publishing {
	publications {
		create("mavenJava", MavenPublication) {
			artifactId = project.archives_base_name
			from components.java
		}
	}

	repositories {
	}
}
